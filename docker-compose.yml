name: fa-stats-bot

x-app-common: &app-common
  build:
    context: .
    args:
      USER_ID: ${USER_ID:-1000}
      GROUP_ID: ${GROUP_ID:-1000}
  image: fa-stats-bot/app:local
  volumes:
    - ./:/app
  env_file:
    - .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  app:
    <<: *app-common
    ports:
      - "${APP_PORT:-8000}:8000"

  worker:
    <<: *app-common
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--sleep=1", "--max-time=3600"]

  scheduler:
    <<: *app-common
    command: ["php", "artisan", "schedule:work"]

  # Enable only for local dev without a public webhook (ngrok).
  # Usage: docker compose --profile polling up bot
  bot:
    <<: *app-common
    command: ["php", "artisan", "nutgram:listen"]
    profiles: [polling]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-fa_stats}
      POSTGRES_USER: ${DB_USERNAME:-fa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME:-fa}", "-d", "${DB_DATABASE:-fa_stats}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
