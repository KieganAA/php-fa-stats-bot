# Production compose for the 164.92.219.14 droplet.
#
# That box also runs aio-support-brain (its nginx owns port 80) and a host
# mysqld on 3306 — so this stack must stay fully self-contained:
#   - own compose project name → own network, no cross-talk
#   - NOTHING published except 443 (free on the host), which Caddy owns
#   - postgres/redis reachable only inside the project network
#   - memory limits sized for a 2 GB droplet shared with the neighbours
#
# TLS: Cloudflare proxies dicta-voluptatem-voluptatem.top → origin :443
# (zone SSL mode "Full"). Caddy terminates with a locally-signed cert
# (`tls internal`) — Full mode accepts it; no ACME needed (and ACME can't
# work here anyway: port 80 belongs to the neighbour).
#
# Code is bind-mounted from the git checkout (same model as dev): deploys are
# `git pull` + composer + `octane:reload`, no image rebuild. The app runs as
# uid 1000 — scripts/deploy.sh chowns storage/ accordingly.

name: fa-stats-bot

x-app-common: &app-common
  build:
    context: .
    args:
      USER_ID: ${USER_ID:-1000}
      GROUP_ID: ${GROUP_ID:-1000}
  image: fa-stats-bot/app:prod
  volumes:
    - ./:/app
  env_file:
    - .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  logging:
    driver: json-file
    options: { max-size: "10m", max-file: "3" }

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddydata:/data
    depends_on:
      - app
    restart: unless-stopped
    mem_limit: 64m
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

  app:
    <<: *app-common
    mem_limit: 512m

  worker:
    <<: *app-common
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--sleep=1", "--max-time=3600"]
    mem_limit: 384m

  scheduler:
    <<: *app-common
    command: ["php", "artisan", "schedule:work"]
    mem_limit: 256m

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-fa_stats}
      POSTGRES_USER: ${DB_USERNAME:-fa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME:-fa}", "-d", "${DB_DATABASE:-fa_stats}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 96m
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

volumes:
  pgdata:
  redisdata:
  caddydata:
