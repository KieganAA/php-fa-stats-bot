<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>bot-stats</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <main id="root">
        <header class="header">
            <strong>🔔 bot-stats</strong>
            <button id="open-options" class="link" title="Настройки">⚙️</button>
        </header>

        <section id="not-configured" class="state hidden">
            <p>Расширение не настроено.</p>
            <p class="hint">Запусти в боте <code>/extension_token</code>, вставь токен в настройках.</p>
            <button id="open-options-2" class="primary">Открыть настройки</button>
        </section>

        <section id="auth-error" class="state hidden">
            <p>❌ Токен не работает или истёк.</p>
            <p class="hint">Сгенерируй заново через <code>/extension_token</code>.</p>
            <button id="open-options-3" class="primary">Открыть настройки</button>
        </section>

        <section id="main" class="state hidden">
            <div class="who" id="who"></div>

            <div class="subscribe">
                <input id="camp-input" inputmode="numeric" placeholder="human_id кампании, напр. 036469"
                       autocomplete="off" spellcheck="false">
                <button id="camp-subscribe" class="primary subscribe-btn">Подписать</button>
            </div>
            <div id="subscribe-msg" class="msg hidden"></div>
            <p class="hint tip">💡 Или жми <b>🔔</b> прямо у кампании на странице AIO.</p>

            <h2>Мои кампании <span id="camps-count" class="count"></span></h2>
            <div id="camps" class="camps"></div>
        </section>

        <section id="loading" class="state">
            <p>Загружаю…</p>
        </section>
    </main>

    <script type="module" src="popup.js"></script>
</body>
</html>
